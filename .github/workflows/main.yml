name: 早盘助手

on:
  schedule:
    # 每30分钟触发一次，北京时间 9:00-15:59（UTC 1:00-7:59），周一至周五
    # 共14次/天 = 约14分钟/天，远低于免费额度
    - cron: "0,30 1-7 * * 1-5"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 运行早盘抓取
        run: python 早盘抓取.py
